$schema: https://raw.githubusercontent.com/opengeospatial/bblocks-postprocess/refs/heads/master/ogc/bblocks/schemas/examples.schema.yaml
## Prefixes for examples
prefixes:
  mynamespace: https://example.com/dataset/geo-demo/
## List of examples
examples:
- title: "Usage example of geof:sfEquals: SPARQL Query and sample data"
  content: "A geometry should be equal to itself. The SPARQL query tests this equality relationship using the function geof:sfEquals"

  snippets:
    - language: sparql
      ref: examples/sfEquals.rq
    - language: ttl
      ref: examples/sfEquals.ttl

- title: "Usage example of geof:sDisjoint: SPARQL Query and sample data"
  content: "Two disjoint geometries. The SPARQL query tests their disjointness using the function geof:sfDisjoint"

  snippets:
    - language: sparql
      ref: examples/sfDisjoint.rq
    - language: ttl
      ref: examples/sfDisjoint.ttl

